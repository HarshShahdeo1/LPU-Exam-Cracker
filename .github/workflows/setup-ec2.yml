name: First Time Server Setup

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  setup-ec2:
    runs-on: ubuntu-latest

    steps:
    - name: Run Initial Setup on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          echo "Starting EC2 initialization..."
          
          # 1. Update the server (Non-interactive)
          sudo apt-get update -yq
          sudo apt-get upgrade -yq -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold"
          
          # 2. Install Node.js (Version 20)
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -yq nodejs
          
          # 3. Install Git and PM2
          # 3. Install Git and PM2
          sudo apt-get install -yq git
          sudo npm install -g pm2
          
          # 4. Clone your GitHub repository (Handles private repos automatically)
          if [ ! -d "lpu-exam-cracker" ]; then
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git lpu-exam-cracker
          fi
          
          # 5. Set up Environment Variables
          cd lpu-exam-cracker
          echo "Writing .env.local from GitHub Secrets..."
          echo "${{ secrets.ENV_FILE }}" > .env.local
          
          # 6. Install project dependencies
          npm ci
          
          echo "Server setup complete! Your environment is ready for the CI/CD pipeline."
