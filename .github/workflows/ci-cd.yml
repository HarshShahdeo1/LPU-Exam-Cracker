name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Security Scanning ─────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # Full history for Gitleaks

    - name: 🔐 Gitleaks — Secret Scanning
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: 🛡️ npm audit — Dependency Vulnerability Scan
      run: npm audit --audit-level=high || true

  # ── Build & Lint ───────────────────────────────────────────────────────
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint


    - name: Build Next.js app
      # Environment variables needed for build (add placeholders or secrets if they are required at build time)
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: "placeholder"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "placeholder"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "placeholder"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_APP_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "placeholder"
      run: npm run build

  deploy-to-ec2:
    # Only run deployment on pushes to the main branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-lint, security-scan]
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          export PATH=$PATH:/usr/bin:/usr/local/bin
          
          # ── Create swap space to prevent OOM kills on t2.micro (1GB RAM) ──
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            echo "✅ 2GB swap file created"
          else
            echo "✅ Swap file already exists, skipping"
          fi
          
          # Navigate to project directory
          cd ~/lpu-exam-cracker
          
          # Pull the latest code from GitHub
          git pull origin main
          

          # Install dependencies (memory-efficient flags)
          npm install --prefer-offline --no-audit --no-fund

          # Wipe old build to prevent stale/broken .next from persisting
          rm -rf .next

          # Build the Next.js application (limit Node.js heap to 512MB)
          NODE_OPTIONS="--max-old-space-size=512" npm run build

          # Verify build succeeded before restarting (prevents crash-loop on OOM kill)
          if [ ! -f .next/prerender-manifest.json ]; then
            echo "❌ Build failed — .next/prerender-manifest.json missing. Aborting deploy."
            exit 1
          fi
          echo "✅ Build verified successfully"

          # Restart the application using PM2
          pm2 restart lpu-exam-cracker || pm2 start npm --name "lpu-exam-cracker" -- start
          pm2 save
