name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Build Next.js app
      # Environment variables needed for build (add placeholders or secrets if they are required at build time)
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: "placeholder"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "placeholder"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "placeholder"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_APP_ID: "placeholder"
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "placeholder"
      run: npm run build

  deploy-to-ec2:
    # Only run deployment on pushes to the main branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-lint
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          export PATH=$PATH:/usr/bin:/usr/local/bin
          
          # Assuming the project is cloned in a directory named 'lpu-exam-cracker' in the home folder
          cd ~/lpu-exam-cracker
          
          # Pull the latest code from GitHub
          git pull origin main
          
          # Inject Environment Variables from GitHub Secrets
          echo "${{ secrets.ENV_FILE }}" > .env.local
          
          # Install dependencies
          npm ci
          
          # Build the Next.js application
          npm run build
          
          # Restart the application using PM2 (a popular process manager for Node.js)
          # Make sure PM2 is installed on your EC2 instance globally: npm install -g pm2
          pm2 restart lpu-exam-cracker || pm2 start npm --name "lpu-exam-cracker" -- start
